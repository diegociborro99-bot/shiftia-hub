<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Restablecer Contraseña - Shiftia</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --primary: #2980b9;
            --accent: #4ecdc4;
            --bg: #fafafa;
            --bg-warm: #faf8f5;
            --bg-card: #ffffff;
            --text1: #0f0f0f;
            --text2: #444;
            --text3: #888;
            --border: #e8e8e8;
        }

        body.dark {
            --bg: #0f1117;
            --bg-warm: #141620;
            --bg-card: #1a1d2e;
            --text1: #f0f0f5;
            --text2: #a0a3b5;
            --text3: #6b6f85;
            --border: #2a2d40;
        }

        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--bg);
            color: var(--text1);
            overflow: hidden;
            transition: background-color 0.3s ease, color 0.3s ease;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
        }

        /* Floating gradient orbs */
        .orbs-container {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 0;
        }

        .orb {
            position: absolute;
            border-radius: 50%;
            filter: blur(80px);
            opacity: 0.15;
            mix-blend-mode: screen;
        }

        .orb-1 {
            width: 300px;
            height: 300px;
            background: linear-gradient(135deg, var(--accent), var(--primary));
            top: -100px;
            right: -100px;
            animation: float 15s ease-in-out infinite;
        }

        .orb-2 {
            width: 200px;
            height: 200px;
            background: linear-gradient(135deg, var(--primary), var(--accent));
            bottom: -50px;
            left: -50px;
            animation: float 20s ease-in-out infinite reverse;
        }

        .orb-3 {
            width: 250px;
            height: 250px;
            background: linear-gradient(135deg, var(--accent), #e74c3c);
            top: 50%;
            left: 10%;
            animation: float 18s ease-in-out infinite;
        }

        @keyframes float {
            0%, 100% {
                transform: translate(0, 0);
            }
            50% {
                transform: translate(30px, -30px);
            }
        }

        /* Main content */
        .content {
            position: relative;
            z-index: 1;
            width: 100%;
            max-width: 420px;
            padding: 20px;
        }

        .reset-card {
            background-color: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 48px 40px;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.08);
            transition: all 0.3s ease;
        }

        body.dark .reset-card {
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.3);
        }

        /* Logo section */
        .logo-section {
            display: flex;
            flex-direction: column;
            align-items: center;
            margin-bottom: 40px;
        }

        .logo-icon-wrap {
            width: 72px;
            height: 72px;
            margin-bottom: 20px;
            border-radius: 18px;
            background: linear-gradient(135deg, #4ecdc4, #2980b9);
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 8px 32px rgba(78,205,196,0.25), 0 2px 8px rgba(41,128,185,0.15);
            animation: logoPulse 3s ease-in-out infinite;
            position: relative;
        }

        .logo-icon-wrap::after {
            content: '';
            position: absolute;
            inset: -3px;
            border-radius: 20px;
            background: linear-gradient(135deg, #4ecdc4, #2980b9, #4ecdc4);
            background-size: 200% 200%;
            z-index: -1;
            opacity: 0.4;
            filter: blur(8px);
            animation: logoGlow 4s ease-in-out infinite;
        }

        .logo-icon {
            width: 38px;
            height: 38px;
            animation: logoSpin 8s linear infinite;
        }

        @keyframes logoSpin {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }

        @keyframes logoPulse {
            0%, 100% { transform: scale(1); box-shadow: 0 8px 32px rgba(78,205,196,0.25); }
            50% { transform: scale(1.04); box-shadow: 0 12px 40px rgba(78,205,196,0.35); }
        }

        @keyframes logoGlow {
            0%, 100% { background-position: 0% 50%; opacity: 0.4; }
            50% { background-position: 100% 50%; opacity: 0.6; }
        }

        .logo-text {
            font-size: 32px;
            font-weight: 800;
            letter-spacing: -0.03em;
            margin-bottom: 8px;
            display: flex;
            align-items: baseline;
        }

        .logo-sh {
            color: var(--text1);
        }

        .logo-iftia {
            background: linear-gradient(135deg, #4ecdc4, #2980b9);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .logo-subtitle {
            font-size: 13px;
            color: var(--text3);
            font-weight: 500;
        }

        /* Heading */
        .reset-heading {
            font-size: 18px;
            font-weight: 700;
            color: var(--text1);
            margin-bottom: 8px;
            text-align: center;
        }

        .reset-subheading {
            font-size: 13px;
            color: var(--text3);
            text-align: center;
            margin-bottom: 32px;
            line-height: 1.5;
        }

        /* Form */
        .form-group {
            margin-bottom: 20px;
        }

        label {
            display: block;
            font-size: 13px;
            font-weight: 600;
            color: var(--text1);
            margin-bottom: 8px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        input[type="password"],
        input[type="text"] {
            width: 100%;
            padding: 12px 16px;
            border: 1px solid var(--border);
            border-radius: 8px;
            background-color: var(--bg);
            color: var(--text1);
            font-family: 'Inter', sans-serif;
            font-size: 14px;
            transition: all 0.3s ease;
        }

        input[type="password"]:focus,
        input[type="text"]:focus {
            outline: none;
            border-color: var(--accent);
            box-shadow: 0 0 0 3px rgba(78, 205, 196, 0.1);
        }

        input[type="password"]::placeholder,
        input[type="text"]::placeholder {
            color: var(--text3);
        }

        /* Error / Success message */
        .error-message {
            display: none;
            background-color: #fee;
            border: 1px solid #f5a5a5;
            color: #c33;
            padding: 12px 16px;
            border-radius: 8px;
            margin-bottom: 20px;
            font-size: 13px;
            animation: slideDown 0.3s ease;
        }

        body.dark .error-message {
            background-color: #3d2626;
            border-color: #7a3f3f;
            color: #ff9999;
        }

        .error-message.show {
            display: block;
        }

        .success-message {
            display: none;
            background-color: rgba(78, 205, 196, 0.15);
            border: 1px solid rgba(78, 205, 196, 0.3);
            color: #4ecdc4;
            padding: 12px 16px;
            border-radius: 8px;
            margin-bottom: 20px;
            font-size: 13px;
            animation: slideDown 0.3s ease;
        }

        .success-message.show {
            display: block;
        }

        @keyframes slideDown {
            from {
                opacity: 0;
                transform: translateY(-10px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        /* Submit button */
        .submit-btn {
            width: 100%;
            padding: 12px 16px;
            background: linear-gradient(135deg, var(--accent), var(--primary));
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 14px;
            font-weight: 600;
            font-family: 'Inter', sans-serif;
            cursor: pointer;
            transition: all 0.3s ease;
            margin-top: 24px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .submit-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 24px rgba(78, 205, 196, 0.3);
        }

        .submit-btn:active {
            transform: translateY(0);
        }

        .submit-btn:disabled {
            opacity: 0.8;
            cursor: not-allowed;
        }

        /* Spinner */
        .spinner {
            width: 16px;
            height: 16px;
            border: 2px solid rgba(255, 255, 255, 0.3);
            border-top-color: white;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
        }

        @keyframes spin {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }

        /* Password strength indicator */
        .password-strength {
            display: none;
            margin-top: 8px;
            padding: 8px 12px;
            border-radius: 6px;
            font-size: 12px;
            font-weight: 600;
        }

        .password-strength.show {
            display: block;
        }

        .strength-weak {
            background-color: rgba(255, 107, 107, 0.15);
            color: #ff6b6b;
        }

        .strength-medium {
            background-color: rgba(255, 193, 7, 0.15);
            color: #ffc107;
        }

        .strength-strong {
            background-color: rgba(76, 175, 80, 0.15);
            color: #4caf50;
        }

        /* Links */
        .footer-link {
            text-align: center;
            margin-top: 32px;
            padding-top: 24px;
            border-top: 1px solid var(--border);
        }

        .footer-link a {
            font-size: 13px;
            color: var(--primary);
            text-decoration: none;
            font-weight: 500;
            transition: all 0.3s ease;
        }

        .footer-link a:hover {
            color: var(--accent);
        }

        .success-links {
            display: none;
            text-align: center;
            margin-top: 24px;
        }

        .success-links.show {
            display: block;
        }

        .success-links a {
            font-size: 13px;
            color: var(--primary);
            text-decoration: none;
            font-weight: 500;
            transition: all 0.3s ease;
        }

        .success-links a:hover {
            color: var(--accent);
        }

        /* Responsive */
        @media (max-width: 480px) {
            .reset-card {
                padding: 32px 24px;
            }

            .logo-text {
                font-size: 24px;
            }

            .logo-icon-wrap {
                width: 56px;
                height: 56px;
                border-radius: 14px;
            }

            .logo-icon {
                width: 30px;
                height: 30px;
            }

            .content {
                max-width: 100%;
            }

            .orb {
                filter: blur(60px);
            }
        }
    </style>
</head>
<body>
    <!-- Floating gradient orbs -->
    <div class="orbs-container">
        <div class="orb orb-1"></div>
        <div class="orb orb-2"></div>
        <div class="orb orb-3"></div>
    </div>

    <!-- Main content -->
    <div class="content">
        <div class="reset-card">
            <!-- Logo section -->
            <div class="logo-section">
                <div class="logo-icon-wrap">
                    <svg class="logo-icon" viewBox="0 0 40 40" fill="none">
                        <defs><linearGradient id="sG" x1="0" y1="0" x2="40" y2="40" gradientUnits="userSpaceOnUse"><stop stop-color="#fff"/><stop offset="1" stop-color="rgba(255,255,255,0.7)"/></linearGradient></defs>
                        <path d="M20 35c-8-2-14-8-12-16s10-12 18-10c-6-1-12 3-13 9s4 12 10 14" stroke="url(#sG)" stroke-width="2.5" fill="none"/>
                        <path d="M18 10c8 2 14 8 12 16s-10 12-18 10c6 1 12-3 13-9s-4-12-10-14" stroke="url(#sG)" stroke-width="2.5" fill="none"/>
                        <path d="M28 8l4-4 2 5" stroke="url(#sG)" stroke-width="2" fill="none"/>
                    </svg>
                </div>
                <h1 class="logo-text"><span class="logo-sh">Sh</span><span class="logo-iftia">iftia</span></h1>
                <p class="logo-subtitle">Planificacion de Turnos Hospitalarios</p>
            </div>

            <!-- Heading -->
            <h2 class="reset-heading">Restablecer Contraseña</h2>
            <p class="reset-subheading">Ingresa tu nueva contraseña abajo. Debe tener al menos 6 caracteres.</p>

            <!-- Error / Success message -->
            <div class="error-message" id="errorMessage"></div>
            <div class="success-message" id="successMessage"></div>

            <!-- Reset form (hidden on success) -->
            <form id="resetForm">
                <div class="form-group">
                    <label for="password">Nueva Contraseña</label>
                    <input type="password" id="password" name="password" placeholder="Minimo 8 caracteres" required minlength="8" autocomplete="new-password">
                    <div class="password-strength" id="passwordStrength"></div>
                </div>
                <div class="form-group">
                    <label for="confirmPassword">Confirmar Contraseña</label>
                    <input type="password" id="confirmPassword" name="confirmPassword" placeholder="Confirma tu contraseña" required autocomplete="new-password">
                </div>
                <button type="submit" class="submit-btn" id="submitBtn">
                    <span id="btnText">Restablecer Contraseña</span>
                </button>
            </form>

            <!-- Success message with links (hidden initially) -->
            <div class="success-links" id="successLinks">
                <p style="color: var(--text2); font-size: 14px; margin-bottom: 24px;">
                    ✓ Tu contraseña ha sido restablecida exitosamente. Ahora puedes iniciar sesión con tu nueva contraseña.
                </p>
                <a href="/login">← Volver a iniciar sesión</a>
            </div>

            <!-- Footer link -->
            <div class="footer-link">
                <a href="/">← Volver a shiftia.es</a>
            </div>
        </div>
    </div>

    <script>
        // Dark mode detection
        function initDarkMode() {
            const prefersDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
            if (prefersDark) {
                document.body.classList.add('dark');
            }

            // Listen for system theme changes
            window.matchMedia('(prefers-color-scheme: dark)').addEventListener('change', e => {
                if (e.matches) {
                    document.body.classList.add('dark');
                } else {
                    document.body.classList.remove('dark');
                }
            });
        }

        // Get token from URL
        function getTokenFromUrl() {
            const params = new URLSearchParams(window.location.search);
            return params.get('token');
        }

        // Validate token on page load
        function validateToken() {
            const token = getTokenFromUrl();
            if (!token) {
                showError('No se proporcionó un token válido. El enlace puede estar expirado o ser inválido.');
                document.getElementById('resetForm').style.display = 'none';
                return false;
            }
            return true;
        }

        // Show error message
        function showError(message) {
            const errorMessage = document.getElementById('errorMessage');
            errorMessage.textContent = message;
            errorMessage.classList.add('show');
        }

        // Show success
        function showSuccess() {
            document.getElementById('resetForm').style.display = 'none';
            document.getElementById('errorMessage').classList.remove('show');
            document.getElementById('successLinks').classList.add('show');
        }

        // Password strength indicator
        function updatePasswordStrength() {
            const password = document.getElementById('password').value;
            const strengthDiv = document.getElementById('passwordStrength');

            if (!password) {
                strengthDiv.classList.remove('show');
                return;
            }

            let strength = 'weak';
            let message = 'Contraseña débil';

            if (password.length >= 8) {
                const hasUpper = /[A-Z]/.test(password);
                const hasLower = /[a-z]/.test(password);
                const hasNumber = /[0-9]/.test(password);
                const hasSpecial = /[!@#$%^&*]/.test(password);

                const types = [hasUpper, hasLower, hasNumber, hasSpecial].filter(Boolean).length;

                if (types >= 3 || password.length >= 12) {
                    strength = 'strong';
                    message = 'Contraseña fuerte';
                } else if (types >= 2) {
                    strength = 'medium';
                    message = 'Contraseña media';
                }
            }

            strengthDiv.className = `password-strength show strength-${strength}`;
            strengthDiv.textContent = message;
        }

        // Handle form submission
        document.getElementById('resetForm').addEventListener('submit', async (e) => {
            e.preventDefault();

            const password = document.getElementById('password').value;
            const confirmPassword = document.getElementById('confirmPassword').value;
            const token = getTokenFromUrl();
            const submitBtn = document.getElementById('submitBtn');
            const btnText = document.getElementById('btnText');
            const errorMessage = document.getElementById('errorMessage');

            // Clear previous error
            errorMessage.classList.remove('show');

            // Validate passwords
            if (password.length < 8) {
                showError('La contraseña debe tener al menos 8 caracteres');
                return;
            }

            if (password !== confirmPassword) {
                showError('Las contraseñas no coinciden');
                return;
            }

            if (!token) {
                showError('Token inválido. Por favor, solicita un nuevo enlace de restablecimiento.');
                return;
            }

            // Disable button and show spinner
            submitBtn.disabled = true;
            btnText.innerHTML = '<div class="spinner"></div>';

            try {
                const response = await fetch('/api/auth/reset-password', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify({ token, password }),
                });

                const data = await response.json();

                if (response.ok) {
                    showSuccess();
                } else {
                    showError(data.error || 'Error al restablecer la contraseña');
                    submitBtn.disabled = false;
                    btnText.textContent = 'Restablecer Contraseña';
                }
            } catch (error) {
                showError('Error de conexión. Por favor, intenta nuevamente.');
                submitBtn.disabled = false;
                btnText.textContent = 'Restablecer Contraseña';
                console.error('Reset error:', error);
            }
        });

        // Update password strength on input
        document.getElementById('password').addEventListener('input', updatePasswordStrength);

        // Initialize on page load
        document.addEventListener('DOMContentLoaded', () => {
            initDarkMode();
            validateToken();
        });
    </script>
</body>
</html>
