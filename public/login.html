<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Iniciar Sesión - Shiftia</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --primary: #2980b9;
            --accent: #4ecdc4;
            --bg: #fafafa;
            --bg-warm: #faf8f5;
            --bg-card: #ffffff;
            --text1: #0f0f0f;
            --text2: #444;
            --text3: #888;
            --border: #e8e8e8;
        }

        body.dark {
            --bg: #0f1117;
            --bg-warm: #141620;
            --bg-card: #1a1d2e;
            --text1: #f0f0f5;
            --text2: #a0a3b5;
            --text3: #6b6f85;
            --border: #2a2d40;
        }

        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--bg);
            color: var(--text1);
            overflow: hidden;
            transition: background-color 0.3s ease, color 0.3s ease;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
        }

        /* Floating gradient orbs */
        .orbs-container {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 0;
        }

        .orb {
            position: absolute;
            border-radius: 50%;
            filter: blur(80px);
            opacity: 0.15;
            mix-blend-mode: screen;
        }

        .orb-1 {
            width: 300px;
            height: 300px;
            background: linear-gradient(135deg, var(--accent), var(--primary));
            top: -100px;
            right: -100px;
            animation: float 15s ease-in-out infinite;
        }

        .orb-2 {
            width: 200px;
            height: 200px;
            background: linear-gradient(135deg, var(--primary), var(--accent));
            bottom: -50px;
            left: -50px;
            animation: float 20s ease-in-out infinite reverse;
        }

        .orb-3 {
            width: 250px;
            height: 250px;
            background: linear-gradient(135deg, var(--accent), #e74c3c);
            top: 50%;
            left: 10%;
            animation: float 18s ease-in-out infinite;
        }

        @keyframes float {
            0%, 100% {
                transform: translate(0, 0);
            }
            50% {
                transform: translate(30px, -30px);
            }
        }

        /* Main content */
        .content {
            position: relative;
            z-index: 1;
            width: 100%;
            max-width: 420px;
            padding: 20px;
        }

        .login-card {
            background-color: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 48px 40px;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.08);
            transition: all 0.3s ease;
        }

        body.dark .login-card {
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.3);
        }

        /* Logo section */
        .logo-section {
            display: flex;
            flex-direction: column;
            align-items: center;
            margin-bottom: 40px;
        }

        .logo-icon {
            width: 60px;
            height: 60px;
            margin-bottom: 16px;
            animation: spin 3s linear infinite;
        }

        @keyframes spin {
            from {
                transform: rotate(0deg);
            }
            to {
                transform: rotate(360deg);
            }
        }

        .logo-text {
            font-size: 28px;
            font-weight: 700;
            background: linear-gradient(135deg, var(--primary), var(--accent));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            margin-bottom: 8px;
        }

        .logo-subtitle {
            font-size: 13px;
            color: var(--text3);
            font-weight: 500;
        }

        /* Form */
        .form-group {
            margin-bottom: 20px;
        }

        label {
            display: block;
            font-size: 13px;
            font-weight: 600;
            color: var(--text1);
            margin-bottom: 8px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        input[type="email"],
        input[type="password"] {
            width: 100%;
            padding: 12px 16px;
            border: 1px solid var(--border);
            border-radius: 8px;
            background-color: var(--bg);
            color: var(--text1);
            font-family: 'Inter', sans-serif;
            font-size: 14px;
            transition: all 0.3s ease;
        }

        input[type="email"]:focus,
        input[type="password"]:focus {
            outline: none;
            border-color: var(--accent);
            box-shadow: 0 0 0 3px rgba(78, 205, 196, 0.1);
        }

        input[type="email"]::placeholder,
        input[type="password"]::placeholder {
            color: var(--text3);
        }

        /* Error message */
        .error-message {
            display: none;
            background-color: #fee;
            border: 1px solid #f5a5a5;
            color: #c33;
            padding: 12px 16px;
            border-radius: 8px;
            margin-bottom: 20px;
            font-size: 13px;
            animation: slideDown 0.3s ease;
        }

        body.dark .error-message {
            background-color: #3d2626;
            border-color: #7a3f3f;
            color: #ff9999;
        }

        .error-message.show {
            display: block;
        }

        @keyframes slideDown {
            from {
                opacity: 0;
                transform: translateY(-10px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        /* Submit button */
        .submit-btn {
            width: 100%;
            padding: 12px 16px;
            background: linear-gradient(135deg, var(--accent), var(--primary));
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 14px;
            font-weight: 600;
            font-family: 'Inter', sans-serif;
            cursor: pointer;
            transition: all 0.3s ease;
            margin-top: 24px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .submit-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 24px rgba(78, 205, 196, 0.3);
        }

        .submit-btn:active {
            transform: translateY(0);
        }

        .submit-btn:disabled {
            opacity: 0.8;
            cursor: not-allowed;
        }

        /* Spinner */
        .spinner {
            width: 16px;
            height: 16px;
            border: 2px solid rgba(255, 255, 255, 0.3);
            border-top-color: white;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
        }

        /* Links */
        .forgot-password {
            text-align: center;
            margin-top: 16px;
        }

        .forgot-password a {
            font-size: 13px;
            color: var(--primary);
            text-decoration: none;
            font-weight: 500;
            transition: all 0.3s ease;
        }

        .forgot-password a:hover {
            color: var(--accent);
            text-decoration: underline;
        }

        .footer-link {
            text-align: center;
            margin-top: 32px;
            padding-top: 24px;
            border-top: 1px solid var(--border);
        }

        .footer-link a {
            font-size: 13px;
            color: var(--primary);
            text-decoration: none;
            font-weight: 500;
            transition: all 0.3s ease;
        }

        .footer-link a:hover {
            color: var(--accent);
        }

        /* Responsive */
        @media (max-width: 480px) {
            .login-card {
                padding: 32px 24px;
            }

            .logo-text {
                font-size: 24px;
            }

            .logo-icon {
                width: 50px;
                height: 50px;
            }

            .content {
                max-width: 100%;
            }

            .orb {
                filter: blur(60px);
            }
        }
    </style>
</head>
<body>
    <!-- Floating gradient orbs -->
    <div class="orbs-container">
        <div class="orb orb-1"></div>
        <div class="orb orb-2"></div>
        <div class="orb orb-3"></div>
    </div>

    <!-- Main content -->
    <div class="content">
        <div class="login-card">
            <!-- Logo section -->
            <div class="logo-section">
                <svg class="logo-icon" viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
                    <defs>
                        <linearGradient id="logoGradient" x1="0%" y1="0%" x2="100%" y2="100%">
                            <stop offset="0%" style="stop-color:#4ecdc4;stop-opacity:1" />
                            <stop offset="100%" style="stop-color:#2980b9;stop-opacity:1" />
                        </linearGradient>
                    </defs>
                    <!-- Calendar grid -->
                    <rect x="15" y="15" width="70" height="70" rx="8" fill="none" stroke="url(#logoGradient)" stroke-width="2"/>
                    <!-- Calendar header -->
                    <rect x="15" y="15" width="70" height="15" rx="8" fill="url(#logoGradient)" opacity="0.2"/>
                    <!-- Grid lines -->
                    <line x1="15" y1="35" x2="85" y2="35" stroke="url(#logoGradient)" stroke-width="1" opacity="0.5"/>
                    <line x1="15" y1="50" x2="85" y2="50" stroke="url(#logoGradient)" stroke-width="1" opacity="0.5"/>
                    <line x1="15" y1="65" x2="85" y2="65" stroke="url(#logoGradient)" stroke-width="1" opacity="0.5"/>
                    <line x1="35" y1="15" x2="35" y2="85" stroke="url(#logoGradient)" stroke-width="1" opacity="0.5"/>
                    <line x1="55" y1="15" x2="55" y2="85" stroke="url(#logoGradient)" stroke-width="1" opacity="0.5"/>
                    <!-- Highlight dot -->
                    <circle cx="70" cy="40" r="3" fill="url(#logoGradient)"/>
                </svg>
                <h1 class="logo-text">Shiftia</h1>
                <p class="logo-subtitle">Planificación de Turnos Hospitalarios</p>
            </div>

            <!-- Error message -->
            <div class="error-message" id="errorMessage"></div>

            <!-- Login form -->
            <form id="loginForm">
                <div class="form-group">
                    <label for="email">Correo Electrónico</label>
                    <input
                        type="email"
                        id="email"
                        name="email"
                        placeholder="tu@hospital.es"
                        required
                        autocomplete="email"
                    >
                </div>

                <div class="form-group">
                    <label for="password">Contraseña</label>
                    <input
                        type="password"
                        id="password"
                        name="password"
                        placeholder="Ingresa tu contraseña"
                        required
                        autocomplete="current-password"
                    >
                </div>

                <button type="submit" class="submit-btn" id="submitBtn">
                    <span id="btnText">Iniciar Sesión</span>
                </button>
            </form>

            <!-- Forgot password link -->
            <div class="forgot-password">
                <a href="/forgot-password">¿Olvidaste tu contraseña?</a>
            </div>

            <!-- Footer link -->
            <div class="footer-link">
                <a href="/">← Volver a shiftia.es</a>
            </div>
        </div>
    </div>

    <script>
        // Check if user already has token
        function checkExistingToken() {
            const token = localStorage.getItem('shiftia_token');
            if (token) {
                // Redirect to dashboard
                window.location.href = '/dashboard';
            }
        }

        // Dark mode detection
        function initDarkMode() {
            const prefersDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
            if (prefersDark) {
                document.body.classList.add('dark');
            }

            // Listen for system theme changes
            window.matchMedia('(prefers-color-scheme: dark)').addEventListener('change', e => {
                if (e.matches) {
                    document.body.classList.add('dark');
                } else {
                    document.body.classList.remove('dark');
                }
            });
        }

        // Handle form submission
        document.getElementById('loginForm').addEventListener('submit', async (e) => {
            e.preventDefault();

            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            const submitBtn = document.getElementById('submitBtn');
            const btnText = document.getElementById('btnText');
            const errorMessage = document.getElementById('errorMessage');

            // Clear previous error
            errorMessage.classList.remove('show');

            // Disable button and show spinner
            submitBtn.disabled = true;
            btnText.innerHTML = '<div class="spinner"></div>';

            try {
                const response = await fetch('/api/auth/login', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify({ email, password }),
                });

                const data = await response.json();

                if (response.ok && data.token) {
                    // Store token
                    localStorage.setItem('shiftia_token', data.token);

                    // Redirect to dashboard
                    window.location.href = '/dashboard';
                } else {
                    // Show error message
                    const message = data.message || 'Error al iniciar sesión. Por favor, verifica tus credenciales.';
                    errorMessage.textContent = message;
                    errorMessage.classList.add('show');

                    // Re-enable button
                    submitBtn.disabled = false;
                    btnText.textContent = 'Iniciar Sesión';
                }
            } catch (error) {
                // Network or parsing error
                errorMessage.textContent = 'Error de conexión. Por favor, intenta nuevamente.';
                errorMessage.classList.add('show');

                // Re-enable button
                submitBtn.disabled = false;
                btnText.textContent = 'Iniciar Sesión';

                console.error('Login error:', error);
            }
        });

        // Initialize on page load
        document.addEventListener('DOMContentLoaded', () => {
            checkExistingToken();
            initDarkMode();
        });
    </script>
</body>
</html>
