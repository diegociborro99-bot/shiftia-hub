<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Iniciar Sesión - Shiftia</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --primary: #2980b9;
            --accent: #4ecdc4;
            --bg: #fafafa;
            --bg-warm: #faf8f5;
            --bg-card: #ffffff;
            --text1: #0f0f0f;
            --text2: #444;
            --text3: #888;
            --border: #e8e8e8;
        }

        body.dark {
            --bg: #0f1117;
            --bg-warm: #141620;
            --bg-card: #1a1d2e;
            --text1: #f0f0f5;
            --text2: #a0a3b5;
            --text3: #6b6f85;
            --border: #2a2d40;
        }

        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--bg);
            color: var(--text1);
            overflow: hidden;
            transition: background-color 0.3s ease, color 0.3s ease;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
        }

        /* Floating gradient orbs */
        .orbs-container {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 0;
        }

        .orb {
            position: absolute;
            border-radius: 50%;
            filter: blur(80px);
            opacity: 0.15;
            mix-blend-mode: screen;
        }

        .orb-1 {
            width: 300px;
            height: 300px;
            background: linear-gradient(135deg, var(--accent), var(--primary));
            top: -100px;
            right: -100px;
            animation: float 15s ease-in-out infinite;
        }

        .orb-2 {
            width: 200px;
            height: 200px;
            background: linear-gradient(135deg, var(--primary), var(--accent));
            bottom: -50px;
            left: -50px;
            animation: float 20s ease-in-out infinite reverse;
        }

        .orb-3 {
            width: 250px;
            height: 250px;
            background: linear-gradient(135deg, var(--accent), #e74c3c);
            top: 50%;
            left: 10%;
            animation: float 18s ease-in-out infinite;
        }

        @keyframes float {
            0%, 100% {
                transform: translate(0, 0);
            }
            50% {
                transform: translate(30px, -30px);
            }
        }

        /* Main content */
        .content {
            position: relative;
            z-index: 1;
            width: 100%;
            max-width: 420px;
            padding: 20px;
        }

        .login-card {
            background-color: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 48px 40px;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.08);
            transition: all 0.3s ease;
        }

        body.dark .login-card {
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.3);
        }

        /* Logo section */
        .logo-section {
            display: flex;
            flex-direction: column;
            align-items: center;
            margin-bottom: 40px;
        }

        .logo-icon-wrap {
            width: 72px;
            height: 72px;
            margin-bottom: 20px;
            border-radius: 18px;
            background: linear-gradient(135deg, #4ecdc4, #2980b9);
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 8px 32px rgba(78,205,196,0.25), 0 2px 8px rgba(41,128,185,0.15);
            animation: logoPulse 3s ease-in-out infinite;
            position: relative;
        }

        .logo-icon-wrap::after {
            content: '';
            position: absolute;
            inset: -3px;
            border-radius: 20px;
            background: linear-gradient(135deg, #4ecdc4, #2980b9, #4ecdc4);
            background-size: 200% 200%;
            z-index: -1;
            opacity: 0.4;
            filter: blur(8px);
            animation: logoGlow 4s ease-in-out infinite;
        }

        .logo-icon {
            width: 38px;
            height: 38px;
            animation: logoSpin 8s linear infinite;
        }

        @keyframes logoSpin {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }

        @keyframes logoPulse {
            0%, 100% { transform: scale(1); box-shadow: 0 8px 32px rgba(78,205,196,0.25); }
            50% { transform: scale(1.04); box-shadow: 0 12px 40px rgba(78,205,196,0.35); }
        }

        @keyframes logoGlow {
            0%, 100% { background-position: 0% 50%; opacity: 0.4; }
            50% { background-position: 100% 50%; opacity: 0.6; }
        }

        .logo-text {
            font-size: 32px;
            font-weight: 800;
            letter-spacing: -0.03em;
            margin-bottom: 8px;
            display: flex;
            align-items: baseline;
        }

        .logo-sh {
            color: var(--text1);
        }

        .logo-iftia {
            background: linear-gradient(135deg, #4ecdc4, #2980b9);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .logo-subtitle {
            font-size: 13px;
            color: var(--text3);
            font-weight: 500;
        }

        /* Form */
        .form-group {
            margin-bottom: 20px;
        }

        label {
            display: block;
            font-size: 13px;
            font-weight: 600;
            color: var(--text1);
            margin-bottom: 8px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        input[type="email"],
        input[type="password"] {
            width: 100%;
            padding: 12px 16px;
            border: 1px solid var(--border);
            border-radius: 8px;
            background-color: var(--bg);
            color: var(--text1);
            font-family: 'Inter', sans-serif;
            font-size: 14px;
            transition: all 0.3s ease;
        }

        input[type="email"]:focus,
        input[type="password"]:focus {
            outline: none;
            border-color: var(--accent);
            box-shadow: 0 0 0 3px rgba(78, 205, 196, 0.1);
        }

        input[type="email"]::placeholder,
        input[type="password"]::placeholder {
            color: var(--text3);
        }

        /* Error message */
        .error-message {
            display: none;
            background-color: #fee;
            border: 1px solid #f5a5a5;
            color: #c33;
            padding: 12px 16px;
            border-radius: 8px;
            margin-bottom: 20px;
            font-size: 13px;
            animation: slideDown 0.3s ease;
        }

        body.dark .error-message {
            background-color: #3d2626;
            border-color: #7a3f3f;
            color: #ff9999;
        }

        .error-message.show {
            display: block;
        }

        @keyframes slideDown {
            from {
                opacity: 0;
                transform: translateY(-10px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        /* Submit button */
        .submit-btn {
            width: 100%;
            padding: 12px 16px;
            background: linear-gradient(135deg, var(--accent), var(--primary));
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 14px;
            font-weight: 600;
            font-family: 'Inter', sans-serif;
            cursor: pointer;
            transition: all 0.3s ease;
            margin-top: 24px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .submit-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 24px rgba(78, 205, 196, 0.3);
        }

        .submit-btn:active {
            transform: translateY(0);
        }

        .submit-btn:disabled {
            opacity: 0.8;
            cursor: not-allowed;
        }

        /* Spinner */
        .spinner {
            width: 16px;
            height: 16px;
            border: 2px solid rgba(255, 255, 255, 0.3);
            border-top-color: white;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
        }

        /* Links */
        .forgot-password {
            text-align: center;
            margin-top: 16px;
        }

        .forgot-password a {
            font-size: 13px;
            color: var(--primary);
            text-decoration: none;
            font-weight: 500;
            transition: all 0.3s ease;
        }

        .forgot-password a:hover {
            color: var(--accent);
            text-decoration: underline;
        }

        .footer-link {
            text-align: center;
            margin-top: 32px;
            padding-top: 24px;
            border-top: 1px solid var(--border);
        }

        .footer-link a {
            font-size: 13px;
            color: var(--primary);
            text-decoration: none;
            font-weight: 500;
            transition: all 0.3s ease;
        }

        .footer-link a:hover {
            color: var(--accent);
        }

        /* Responsive */
        @media (max-width: 480px) {
            .login-card {
                padding: 32px 24px;
            }

            .logo-text {
                font-size: 24px;
            }

            .logo-icon-wrap {
                width: 56px;
                height: 56px;
                border-radius: 14px;
            }

            .logo-icon {
                width: 30px;
                height: 30px;
            }

            .content {
                max-width: 100%;
            }

            .orb {
                filter: blur(60px);
            }
        }
    </style>
</head>
<body>
    <!-- Floating gradient orbs -->
    <div class="orbs-container">
        <div class="orb orb-1"></div>
        <div class="orb orb-2"></div>
        <div class="orb orb-3"></div>
    </div>

    <!-- Main content -->
    <div class="content">
        <div class="login-card">
            <!-- Logo section -->
            <div class="logo-section">
                <div class="logo-icon-wrap">
                    <svg class="logo-icon" viewBox="0 0 40 40" fill="none">
                        <defs><linearGradient id="sG" x1="0" y1="0" x2="40" y2="40" gradientUnits="userSpaceOnUse"><stop stop-color="#fff"/><stop offset="1" stop-color="rgba(255,255,255,0.7)"/></linearGradient></defs>
                        <path d="M20 35c-8-2-14-8-12-16s10-12 18-10c-6-1-12 3-13 9s4 12 10 14" stroke="url(#sG)" stroke-width="2.5" fill="none"/>
                        <path d="M18 10c8 2 14 8 12 16s-10 12-18 10c6 1 12-3 13-9s-4-12-10-14" stroke="url(#sG)" stroke-width="2.5" fill="none"/>
                        <path d="M28 8l4-4 2 5" stroke="url(#sG)" stroke-width="2" fill="none"/>
                    </svg>
                </div>
                <h1 class="logo-text"><span class="logo-sh">Sh</span><span class="logo-iftia">iftia</span></h1>
                <p class="logo-subtitle">Planificacion de Turnos Hospitalarios</p>
            </div>

            <!-- Tab toggle -->
            <div style="display:flex;gap:0;margin-bottom:1.5rem;border-radius:10px;overflow:hidden;border:1px solid rgba(255,255,255,0.1);">
                <button id="tabLogin" onclick="showTab('login')" style="flex:1;padding:10px;border:none;font-weight:600;font-size:0.9rem;cursor:pointer;transition:all 0.3s;background:rgba(255,255,255,0.15);color:white;">Iniciar sesion</button>
                <button id="tabRegister" onclick="showTab('register')" style="flex:1;padding:10px;border:none;font-weight:600;font-size:0.9rem;cursor:pointer;transition:all 0.3s;background:transparent;color:rgba(255,255,255,0.5);">Crear cuenta</button>
            </div>

            <!-- Error / success message -->
            <div class="error-message" id="errorMessage"></div>
            <div class="error-message" id="successMessage" style="background:rgba(78,205,196,0.15);border-color:rgba(78,205,196,0.3);color:#4ecdc4;"></div>

            <!-- Login form -->
            <form id="loginForm">
                <div class="form-group">
                    <label for="email">Correo Electronico</label>
                    <input type="email" id="email" name="email" placeholder="tu@hospital.es" required autocomplete="email">
                </div>
                <div class="form-group">
                    <label for="password">Contrasena</label>
                    <input type="password" id="password" name="password" placeholder="Tu contrasena" required autocomplete="current-password">
                </div>
                <button type="submit" class="submit-btn" id="submitBtn">
                    <span id="btnText">Iniciar Sesion</span>
                </button>
            </form>

            <!-- Register form -->
            <form id="registerForm" style="display:none;">
                <div class="form-group">
                    <label for="regName">Nombre completo</label>
                    <input type="text" id="regName" placeholder="Tu nombre" required autocomplete="name">
                </div>
                <div class="form-group">
                    <label for="regEmail">Correo Electronico</label>
                    <input type="email" id="regEmail" placeholder="tu@hospital.es" required autocomplete="email">
                </div>
                <div class="form-group">
                    <label for="regCompany">Hospital / Empresa</label>
                    <input type="text" id="regCompany" placeholder="Nombre de tu centro (opcional)" autocomplete="organization">
                </div>
                <div class="form-group">
                    <label for="regPassword">Contrasena</label>
                    <input type="password" id="regPassword" placeholder="Minimo 6 caracteres" required minlength="6" autocomplete="new-password">
                </div>
                <button type="submit" class="submit-btn" id="regSubmitBtn">
                    <span id="regBtnText">Crear cuenta</span>
                </button>
            </form>

            <!-- Forgot password link -->
            <div class="forgot-password" id="forgotLink">
                <a href="/forgot-password">Olvidaste tu contrasena?</a>
            </div>

            <!-- Footer link -->
            <div class="footer-link">
                <a href="/">← Volver a shiftia.es</a>
            </div>
        </div>
    </div>

    <script>
        // Get redirect URL from query params (for checkout flow)
        function getRedirectUrl() {
            const params = new URLSearchParams(window.location.search);
            return params.get('redirect') || '/dashboard';
        }

        // Check if user already has token
        function checkExistingToken() {
            const token = localStorage.getItem('shiftia_token');
            if (token) {
                window.location.href = getRedirectUrl();
            }
        }

        // Dark mode detection
        function initDarkMode() {
            const prefersDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
            if (prefersDark) {
                document.body.classList.add('dark');
            }

            // Listen for system theme changes
            window.matchMedia('(prefers-color-scheme: dark)').addEventListener('change', e => {
                if (e.matches) {
                    document.body.classList.add('dark');
                } else {
                    document.body.classList.remove('dark');
                }
            });
        }

        // Handle form submission
        document.getElementById('loginForm').addEventListener('submit', async (e) => {
            e.preventDefault();

            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            const submitBtn = document.getElementById('submitBtn');
            const btnText = document.getElementById('btnText');
            const errorMessage = document.getElementById('errorMessage');

            // Clear previous error
            errorMessage.classList.remove('show');

            // Disable button and show spinner
            submitBtn.disabled = true;
            btnText.innerHTML = '<div class="spinner"></div>';

            try {
                const response = await fetch('/api/auth/login', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify({ email, password }),
                });

                const data = await response.json();

                if (response.ok && data.token) {
                    // Store token
                    localStorage.setItem('shiftia_token', data.token);

                    // Redirect to dashboard or checkout
                    window.location.href = getRedirectUrl();
                } else {
                    // Show error message
                    const message = data.message || 'Error al iniciar sesión. Por favor, verifica tus credenciales.';
                    errorMessage.textContent = message;
                    errorMessage.classList.add('show');

                    // Re-enable button
                    submitBtn.disabled = false;
                    btnText.textContent = 'Iniciar Sesión';
                }
            } catch (error) {
                // Network or parsing error
                errorMessage.textContent = 'Error de conexión. Por favor, intenta nuevamente.';
                errorMessage.classList.add('show');

                // Re-enable button
                submitBtn.disabled = false;
                btnText.textContent = 'Iniciar Sesión';

                console.error('Login error:', error);
            }
        });

        // Tab switching
        function showTab(tab) {
            const isLogin = tab === 'login';
            document.getElementById('loginForm').style.display = isLogin ? 'block' : 'none';
            document.getElementById('registerForm').style.display = isLogin ? 'none' : 'block';
            document.getElementById('forgotLink').style.display = isLogin ? 'block' : 'none';
            document.getElementById('tabLogin').style.background = isLogin ? 'rgba(255,255,255,0.15)' : 'transparent';
            document.getElementById('tabLogin').style.color = isLogin ? 'white' : 'rgba(255,255,255,0.5)';
            document.getElementById('tabRegister').style.background = isLogin ? 'transparent' : 'rgba(255,255,255,0.15)';
            document.getElementById('tabRegister').style.color = isLogin ? 'rgba(255,255,255,0.5)' : 'white';
            document.getElementById('errorMessage').classList.remove('show');
            document.getElementById('successMessage').classList.remove('show');
        }

        // Register form
        document.getElementById('registerForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const btn = document.getElementById('regSubmitBtn');
            const btnText = document.getElementById('regBtnText');
            const errorMessage = document.getElementById('errorMessage');
            const successMessage = document.getElementById('successMessage');

            errorMessage.classList.remove('show');
            successMessage.classList.remove('show');
            btn.disabled = true;
            btnText.innerHTML = '<div class="spinner"></div>';

            try {
                const res = await fetch('/api/auth/register', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        name: document.getElementById('regName').value,
                        email: document.getElementById('regEmail').value,
                        company: document.getElementById('regCompany').value,
                        password: document.getElementById('regPassword').value
                    })
                });
                const data = await res.json();

                if (res.ok && data.token) {
                    localStorage.setItem('shiftia_token', data.token);
                    window.location.href = getRedirectUrl();
                } else {
                    errorMessage.textContent = data.error || data.message || 'Error al crear la cuenta.';
                    errorMessage.classList.add('show');
                    btn.disabled = false;
                    btnText.textContent = 'Crear cuenta';
                }
            } catch (err) {
                errorMessage.textContent = 'Error de conexion. Intentalo de nuevo.';
                errorMessage.classList.add('show');
                btn.disabled = false;
                btnText.textContent = 'Crear cuenta';
            }
        });

        // Auto-show register tab if coming from checkout (user likely doesn't have account)
        function checkInitialTab() {
            const params = new URLSearchParams(window.location.search);
            if (params.get('redirect') && params.get('redirect').includes('intent=checkout')) {
                showTab('register');
            }
        }

        // Initialize on page load
        document.addEventListener('DOMContentLoaded', () => {
            checkExistingToken();
            initDarkMode();
            checkInitialTab();
        });
    </script>
</body>
</html>
