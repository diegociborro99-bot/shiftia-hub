<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <defs>
    <linearGradient id="bgGrad" x1="0" y1="0" x2="1200" y2="630" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#4ecdc4"/>
      <stop offset="1" stop-color="#2980b9"/>
    </linearGradient>
    <linearGradient id="cardShadow" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#000000" stop-opacity="0.18"/>
      <stop offset="1" stop-color="#000000" stop-opacity="0"/>
    </linearGradient>
    <filter id="softShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="14"/>
      <feOffset dx="0" dy="10" result="offsetblur"/>
      <feComponentTransfer><feFuncA type="linear" slope="0.22"/></feComponentTransfer>
      <feMerge><feMergeNode/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Background gradient -->
  <rect width="1200" height="630" fill="url(#bgGrad)"/>

  <!-- Subtle diagonal pattern (very low opacity, will not interfere) -->
  <g opacity="0.06" fill="#ffffff">
    <circle cx="1080" cy="80" r="3"/>
    <circle cx="1130" cy="140" r="2"/>
    <circle cx="1060" cy="200" r="2"/>
    <circle cx="80"   cy="500" r="3"/>
    <circle cx="140"  cy="560" r="2"/>
    <circle cx="60"   cy="430" r="2"/>
  </g>

  <!-- Schedule mockup card (left side) -->
  <g filter="url(#softShadow)">
    <rect x="60" y="105" width="540" height="420" rx="22" fill="#ffffff"/>
  </g>

  <!-- Card header bar -->
  <rect x="60" y="105" width="540" height="56" rx="22" fill="#0e2a3a"/>
  <rect x="60" y="135" width="540" height="26"      fill="#0e2a3a"/>
  <circle cx="90"  cy="133" r="6" fill="#ff6b6b"/>
  <circle cx="112" cy="133" r="6" fill="#ffd166"/>
  <circle cx="134" cy="133" r="6" fill="#4ecdc4"/>
  <text x="170" y="140" font-family="Helvetica, Arial, sans-serif" font-size="18" font-weight="600" fill="#ffffff" opacity="0.92">Cuadrante semanal · Equipo Mañana</text>

  <!-- Day headers -->
  <g font-family="Helvetica, Arial, sans-serif" font-size="16" font-weight="700" fill="#0e2a3a">
    <text x="180" y="200" text-anchor="middle">L</text>
    <text x="240" y="200" text-anchor="middle">M</text>
    <text x="300" y="200" text-anchor="middle">X</text>
    <text x="360" y="200" text-anchor="middle">J</text>
    <text x="420" y="200" text-anchor="middle">V</text>
    <text x="480" y="200" text-anchor="middle">S</text>
    <text x="540" y="200" text-anchor="middle">D</text>
  </g>

  <!-- Employee rows + shift cells -->
  <g font-family="Helvetica, Arial, sans-serif" font-size="14" fill="#4a5b66">
    <!-- Row 1 -->
    <text x="80" y="246" font-weight="600" fill="#0e2a3a">Ana</text>
    <rect x="156" y="228" width="48" height="28" rx="6" fill="#4ecdc4"/>
    <rect x="216" y="228" width="48" height="28" rx="6" fill="#4ecdc4"/>
    <rect x="276" y="228" width="48" height="28" rx="6" fill="#e9eef2"/>
    <rect x="336" y="228" width="48" height="28" rx="6" fill="#ffd166"/>
    <rect x="396" y="228" width="48" height="28" rx="6" fill="#ffd166"/>
    <rect x="456" y="228" width="48" height="28" rx="6" fill="#e9eef2"/>
    <rect x="516" y="228" width="48" height="28" rx="6" fill="#e9eef2"/>

    <!-- Row 2 -->
    <text x="80" y="292" font-weight="600" fill="#0e2a3a">Luis</text>
    <rect x="156" y="274" width="48" height="28" rx="6" fill="#ffd166"/>
    <rect x="216" y="274" width="48" height="28" rx="6" fill="#e9eef2"/>
    <rect x="276" y="274" width="48" height="28" rx="6" fill="#4ecdc4"/>
    <rect x="336" y="274" width="48" height="28" rx="6" fill="#4ecdc4"/>
    <rect x="396" y="274" width="48" height="28" rx="6" fill="#e9eef2"/>
    <rect x="456" y="274" width="48" height="28" rx="6" fill="#a78bfa"/>
    <rect x="516" y="274" width="48" height="28" rx="6" fill="#a78bfa"/>

    <!-- Row 3 -->
    <text x="80" y="338" font-weight="600" fill="#0e2a3a">Marta</text>
    <rect x="156" y="320" width="48" height="28" rx="6" fill="#e9eef2"/>
    <rect x="216" y="320" width="48" height="28" rx="6" fill="#4ecdc4"/>
    <rect x="276" y="320" width="48" height="28" rx="6" fill="#4ecdc4"/>
    <rect x="336" y="320" width="48" height="28" rx="6" fill="#e9eef2"/>
    <rect x="396" y="320" width="48" height="28" rx="6" fill="#ffd166"/>
    <rect x="456" y="320" width="48" height="28" rx="6" fill="#ffd166"/>
    <rect x="516" y="320" width="48" height="28" rx="6" fill="#e9eef2"/>

    <!-- Row 4 -->
    <text x="80" y="384" font-weight="600" fill="#0e2a3a">Pedro</text>
    <rect x="156" y="366" width="48" height="28" rx="6" fill="#a78bfa"/>
    <rect x="216" y="366" width="48" height="28" rx="6" fill="#a78bfa"/>
    <rect x="276" y="366" width="48" height="28" rx="6" fill="#e9eef2"/>
    <rect x="336" y="366" width="48" height="28" rx="6" fill="#4ecdc4"/>
    <rect x="396" y="366" width="48" height="28" rx="6" fill="#4ecdc4"/>
    <rect x="456" y="366" width="48" height="28" rx="6" fill="#e9eef2"/>
    <rect x="516" y="366" width="48" height="28" rx="6" fill="#ffd166"/>

    <!-- Row 5 -->
    <text x="80" y="430" font-weight="600" fill="#0e2a3a">Sara</text>
    <rect x="156" y="412" width="48" height="28" rx="6" fill="#4ecdc4"/>
    <rect x="216" y="412" width="48" height="28" rx="6" fill="#e9eef2"/>
    <rect x="276" y="412" width="48" height="28" rx="6" fill="#ffd166"/>
    <rect x="336" y="412" width="48" height="28" rx="6" fill="#ffd166"/>
    <rect x="396" y="412" width="48" height="28" rx="6" fill="#a78bfa"/>
    <rect x="456" y="412" width="48" height="28" rx="6" fill="#4ecdc4"/>
    <rect x="516" y="412" width="48" height="28" rx="6" fill="#4ecdc4"/>
  </g>

  <!-- Legend -->
  <g font-family="Helvetica, Arial, sans-serif" font-size="13" fill="#4a5b66">
    <rect x="80"  y="468" width="14" height="14" rx="3" fill="#4ecdc4"/>
    <text x="100" y="480">Mañana</text>
    <rect x="180" y="468" width="14" height="14" rx="3" fill="#ffd166"/>
    <text x="200" y="480">Tarde</text>
    <rect x="270" y="468" width="14" height="14" rx="3" fill="#a78bfa"/>
    <text x="290" y="480">Noche</text>
    <rect x="370" y="468" width="14" height="14" rx="3" fill="#e9eef2"/>
    <text x="390" y="480">Libre</text>
  </g>

  <!-- Right side: branding -->
  <!-- Logo S badge -->
  <g transform="translate(680,140)">
    <rect width="84" height="84" rx="20" fill="#ffffff"/>
    <text x="42" y="62" text-anchor="middle" font-family="Helvetica, Arial, sans-serif" font-size="56" font-weight="800" fill="#2980b9">S</text>
  </g>

  <!-- Wordmark "Shiftia" -->
  <text x="680" y="320" font-family="Helvetica, Arial, sans-serif" font-size="120" font-weight="800" fill="#ffffff" letter-spacing="-3">Shiftia</text>

  <!-- Tagline -->
  <text x="680" y="380" font-family="Helvetica, Arial, sans-serif" font-size="32" font-weight="500" fill="#ffffff" opacity="0.95">Planificación inteligente</text>
  <text x="680" y="420" font-family="Helvetica, Arial, sans-serif" font-size="32" font-weight="500" fill="#ffffff" opacity="0.95">de turnos con IA</text>

  <!-- Divider -->
  <rect x="680" y="450" width="80" height="3" rx="1.5" fill="#ffffff" opacity="0.5"/>

  <!-- URL -->
  <text x="680" y="500" font-family="Helvetica, Arial, sans-serif" font-size="26" font-weight="700" fill="#ffffff" opacity="0.92">www.shiftia.es</text>

  <!-- Subtle border -->
  <rect x="1" y="1" width="1198" height="628" fill="none" stroke="#ffffff" stroke-opacity="0.08" stroke-width="2"/>
</svg>
