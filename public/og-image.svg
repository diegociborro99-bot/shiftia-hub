<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <defs>
    <linearGradient id="bgGrad" x1="0" y1="0" x2="1200" y2="630" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#4ecdc4"/>
      <stop offset="1" stop-color="#2980b9"/>
    </linearGradient>
    <linearGradient id="logoStroke" x1="0" y1="0" x2="160" y2="160" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#ffffff"/>
      <stop offset="1" stop-color="#ffffff" stop-opacity="0.78"/>
    </linearGradient>
    <radialGradient id="glow" cx="50%" cy="50%" r="50%">
      <stop offset="0" stop-color="#ffffff" stop-opacity="0.18"/>
      <stop offset="1" stop-color="#ffffff" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- Background gradient -->
  <rect width="1200" height="630" fill="url(#bgGrad)"/>

  <!-- Decorative orbs -->
  <circle cx="980" cy="120" r="220" fill="url(#glow)"/>
  <circle cx="180" cy="540" r="260" fill="url(#glow)"/>

  <!-- Logo "S" mark -->
  <g transform="translate(140,180) scale(2.4)">
    <path d="M80 140c-32-8-56-32-48-64s40-48 72-40c-24-4-48 12-52 36s16 48 40 56" stroke="url(#logoStroke)" stroke-width="10" fill="none" stroke-linecap="round"/>
    <path d="M72 40c32 8 56 32 48 64s-40 48-72 40c24 4 48-12 52-36s-16-48-40-56" stroke="url(#logoStroke)" stroke-width="10" fill="none" stroke-linecap="round"/>
    <path d="M112 32l16-16 8 20" stroke="url(#logoStroke)" stroke-width="8" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
  </g>

  <!-- Wordmark "Shiftia" -->
  <text x="540" y="320" font-family="'Plus Jakarta Sans','Inter','Segoe UI',system-ui,sans-serif" font-size="148" font-weight="800" fill="#ffffff" letter-spacing="-4">Shiftia</text>

  <!-- Tagline -->
  <text x="540" y="400" font-family="'Inter','Segoe UI',system-ui,sans-serif" font-size="42" font-weight="500" fill="#ffffff" opacity="0.92">Planificación inteligente de turnos</text>

  <!-- Bottom URL -->
  <text x="540" y="480" font-family="'Inter','Segoe UI',system-ui,sans-serif" font-size="28" font-weight="600" fill="#ffffff" opacity="0.7">www.shiftia.es</text>

  <!-- Subtle border -->
  <rect x="2" y="2" width="1196" height="626" fill="none" stroke="#ffffff" stroke-opacity="0.08" stroke-width="2"/>
</svg>
