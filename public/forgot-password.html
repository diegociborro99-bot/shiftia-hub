<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Recuperar contraseña - Shiftia</title>
    <link rel="canonical" href="https://www.shiftia.es/forgot-password">
    <meta name="description" content="Recupera el acceso a tu cuenta de Shiftia. Te enviaremos un enlace por email para restablecer tu contraseña.">
    <link rel="icon" type="image/svg+xml" href="/favicon.svg">
    <link rel="apple-touch-icon" href="/apple-touch-icon.svg">
    <link rel="manifest" href="/site.webmanifest">
    <meta name="theme-color" content="#2980b9" media="(prefers-color-scheme: light)">
    <meta name="theme-color" content="#0f172a" media="(prefers-color-scheme: dark)">
    <meta name="robots" content="noindex,follow">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        :root {
            --bg-1: #f0fdf9; --bg-2: #eff6ff; --card: #ffffff;
            --text-1: #1e293b; --text-2: #475569; --text-3: #94a3b8;
            --border: #e2e8f0; --accent-1: #4ecdc4; --accent-2: #2980b9;
            --error: #dc2626; --success: #16a34a;
        }
        @media (prefers-color-scheme: dark) {
            :root {
                --bg-1: #0f172a; --bg-2: #1e293b; --card: #1e293b;
                --text-1: #f1f5f9; --text-2: #cbd5e1; --text-3: #94a3b8;
                --border: #334155;
            }
        }
        body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: linear-gradient(135deg, var(--bg-1), var(--bg-2)); min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 24px; color: var(--text-1); }
        .skip-link { position: absolute; left: -9999px; top: 0; background: var(--accent-2); color: #fff; padding: 8px 16px; z-index: 9999; text-decoration: none; border-radius: 0 0 8px 0; }
        .skip-link:focus { left: 0 !important; }
        main { width: 100%; max-width: 440px; }
        .card { background: var(--card); padding: 40px; border-radius: 16px; box-shadow: 0 8px 32px rgba(0,0,0,0.06); border: 1px solid var(--border); }
        .brand { text-align: center; margin-bottom: 24px; }
        .brand-logo { display: inline-flex; align-items: center; justify-content: center; width: 48px; height: 48px; background: linear-gradient(135deg, var(--accent-1), var(--accent-2)); border-radius: 12px; color: #fff; font-weight: 800; font-size: 1.4rem; margin-bottom: 12px; }
        .brand-name { font-size: 1.4rem; font-weight: 800; color: var(--text-1); }
        h1 { font-size: 1.4rem; margin-bottom: 8px; color: var(--text-1); }
        .subtitle { color: var(--text-2); font-size: 0.95rem; margin-bottom: 28px; line-height: 1.5; }
        label { display: block; font-size: 0.85rem; font-weight: 600; color: var(--text-2); margin-bottom: 6px; }
        input[type="email"] { width: 100%; padding: 12px 14px; border: 1px solid var(--border); border-radius: 8px; font-size: 16px; background: var(--bg-1); color: var(--text-1); transition: border-color .15s; }
        input[type="email"]:focus { outline: none; border-color: var(--accent-2); }
        button { width: 100%; padding: 12px; background: linear-gradient(135deg, var(--accent-1), var(--accent-2)); color: #fff; border: none; border-radius: 8px; font-size: 1rem; font-weight: 600; cursor: pointer; margin-top: 16px; transition: transform .1s, box-shadow .15s; }
        button:hover:not(:disabled) { transform: translateY(-1px); box-shadow: 0 4px 16px rgba(78,205,196,0.3); }
        button:disabled { opacity: 0.6; cursor: not-allowed; }
        .alert { padding: 12px 14px; border-radius: 8px; margin-top: 16px; font-size: 0.9rem; line-height: 1.5; display: none; }
        .alert.show { display: block; }
        .alert.success { background: rgba(22,163,74,0.1); border: 1px solid rgba(22,163,74,0.3); color: var(--success); }
        .alert.error { background: rgba(220,38,38,0.1); border: 1px solid rgba(220,38,38,0.3); color: var(--error); }
        .footer-link { text-align: center; margin-top: 20px; }
        .footer-link a { color: var(--accent-2); text-decoration: none; font-size: 0.9rem; }
        .footer-link a:hover { text-decoration: underline; }
    </style>
</head>
<body>
    <a href="#main" class="skip-link">Saltar al contenido principal</a>
    <main id="main">
        <div class="card">
            <div class="brand">
                <div class="brand-logo" aria-hidden="true">S</div>
                <div class="brand-name">Shiftia</div>
            </div>
            <h1>Recuperar contraseña</h1>
            <p class="subtitle">Introduce tu email y te enviaremos un enlace para restablecer tu contraseña.</p>
            <form id="forgotForm" novalidate>
                <label for="email">Correo electrónico</label>
                <input type="email" id="email" name="email" required autocomplete="email" inputmode="email" placeholder="tu@empresa.com">
                <button type="submit" id="submitBtn">Enviar enlace</button>
                <div class="alert success" id="successAlert">Si tu email está registrado, te hemos enviado un enlace de recuperación. Revisa tu bandeja de entrada (y la carpeta de spam).</div>
                <div class="alert error" id="errorAlert"></div>
            </form>
            <div class="footer-link"><a href="/login">← Volver al login</a></div>
        </div>
    </main>
    <script>
        const form = document.getElementById('forgotForm');
        const btn = document.getElementById('submitBtn');
        const success = document.getElementById('successAlert');
        const error = document.getElementById('errorAlert');
        form.addEventListener('submit', async (e) => {
            e.preventDefault();
            success.classList.remove('show'); error.classList.remove('show');
            const email = document.getElementById('email').value.trim();
            if (!email) return;
            btn.disabled = true; btn.textContent = 'Enviando...';
            try {
                const res = await fetch('/api/auth/forgot-password', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email })
                });
                const data = await res.json();
                if (res.ok) {
                    success.classList.add('show');
                    form.querySelector('input').value = '';
                } else {
                    error.textContent = data.error || 'Error al enviar el enlace. Inténtalo de nuevo.';
                    error.classList.add('show');
                }
            } catch (_) {
                error.textContent = 'Error de conexión. Inténtalo de nuevo.';
                error.classList.add('show');
            } finally {
                btn.disabled = false; btn.textContent = 'Enviar enlace';
            }
        });
    </script>
</body>
</html>
