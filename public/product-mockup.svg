<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 880" role="img" aria-label="Mockup del dashboard de Shiftia SARA mostrando un cuadrante semanal de turnos con asignaciones automáticas y panel de IA">
  <defs>
    <!-- Sombra suave del marco -->
    <filter id="frameShadow" x="-5%" y="-5%" width="110%" height="120%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="14"/>
      <feOffset dx="0" dy="18"/>
      <feComponentTransfer><feFuncA type="linear" slope="0.10"/></feComponentTransfer>
      <feMerge><feMergeNode/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>

    <!-- Línea sutil para divisores -->
    <linearGradient id="hairline" x1="0" x2="1" y1="0" y2="0">
      <stop offset="0%" stop-color="#e8e6df" stop-opacity="0"/>
      <stop offset="50%" stop-color="#c8c5bb" stop-opacity="1"/>
      <stop offset="100%" stop-color="#e8e6df" stop-opacity="0"/>
    </linearGradient>

    <!-- Colores de turno (paleta sobria) -->
    <linearGradient id="shiftMorning" x1="0" x2="0" y1="0" y2="1">
      <stop offset="0%" stop-color="#e9f5f2"/>
      <stop offset="100%" stop-color="#d6ebe6"/>
    </linearGradient>
    <linearGradient id="shiftEvening" x1="0" x2="0" y1="0" y2="1">
      <stop offset="0%" stop-color="#f4f2ec"/>
      <stop offset="100%" stop-color="#ebe7dc"/>
    </linearGradient>
    <linearGradient id="shiftNight" x1="0" x2="0" y1="0" y2="1">
      <stop offset="0%" stop-color="#0e0f0f"/>
      <stop offset="100%" stop-color="#1a1c1c"/>
    </linearGradient>

    <!-- Animación de pulse en el dot del aside IA -->
    <radialGradient id="pulseDot">
      <stop offset="0%" stop-color="#0f7a6d" stop-opacity="0.8"/>
      <stop offset="100%" stop-color="#0f7a6d" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- Marco del navegador minimal -->
  <g filter="url(#frameShadow)">
    <rect x="40" y="40" width="1200" height="800" rx="20" fill="#ffffff" stroke="#e8e6df" stroke-width="1"/>
    <!-- Title bar -->
    <rect x="40" y="40" width="1200" height="44" rx="20" fill="#faf9f6"/>
    <rect x="40" y="60" width="1200" height="24" fill="#faf9f6"/>
    <line x1="40" y1="84" x2="1240" y2="84" stroke="#e8e6df" stroke-width="1"/>
    <!-- Window dots -->
    <circle cx="68"  cy="62" r="6" fill="#e8e6df"/>
    <circle cx="88"  cy="62" r="6" fill="#e8e6df"/>
    <circle cx="108" cy="62" r="6" fill="#e8e6df"/>
    <!-- URL pill -->
    <rect x="490" y="50" width="300" height="24" rx="12" fill="#fff" stroke="#e8e6df" stroke-width="1"/>
    <text x="640" y="66" text-anchor="middle" font-family="ui-monospace, 'Geist Mono', monospace" font-size="11" fill="#8a8a85">app.shiftia.es / cuadrantes</text>
  </g>

  <!-- App header dentro del frame -->
  <g>
    <text x="80" y="120" font-family="'Instrument Serif', Georgia, serif" font-size="22" fill="#0e0f0f">Shiftia <tspan fill="#8a8a85" font-size="14">/ Cuadrante semanal</tspan></text>
    <!-- Eyebrow del módulo -->
    <text x="80" y="160" font-family="'Geist', system-ui, sans-serif" font-size="10" fill="#8a8a85" letter-spacing="1.4">SEMANA 17 · ABRIL 2026 · UVI HOSPITAL UNIV.</text>
    <!-- H1 grande -->
    <text x="80" y="208" font-family="'Instrument Serif', Georgia, serif" font-size="38" fill="#0e0f0f">Turnos de la semana</text>
    <!-- Botón asignar IA -->
    <g transform="translate(1010, 178)">
      <rect x="0" y="0" width="170" height="38" rx="10" fill="#0e0f0f"/>
      <circle cx="20" cy="19" r="4" fill="#4ed3c0"/>
      <text x="36" y="24" font-family="'Geist', system-ui, sans-serif" font-size="13" font-weight="500" fill="#faf9f6">Asignar con IA</text>
    </g>
    <!-- Filtros -->
    <g transform="translate(80, 240)">
      <rect x="0"   y="0" width="92"  height="30" rx="999" fill="#0e0f0f"/>
      <text x="46"  y="20" text-anchor="middle" font-family="'Geist', sans-serif" font-size="12" font-weight="500" fill="#faf9f6">Todos</text>
      <rect x="100" y="0" width="92"  height="30" rx="999" fill="#fff" stroke="#c8c5bb" stroke-width="1"/>
      <text x="146" y="20" text-anchor="middle" font-family="'Geist', sans-serif" font-size="12" fill="#4a4a47">Enfermería</text>
      <rect x="200" y="0" width="80"  height="30" rx="999" fill="#fff" stroke="#c8c5bb" stroke-width="1"/>
      <text x="240" y="20" text-anchor="middle" font-family="'Geist', sans-serif" font-size="12" fill="#4a4a47">Médicos</text>
      <rect x="288" y="0" width="80"  height="30" rx="999" fill="#fff" stroke="#c8c5bb" stroke-width="1"/>
      <text x="328" y="20" text-anchor="middle" font-family="'Geist', sans-serif" font-size="12" fill="#4a4a47">Auxiliares</text>
    </g>
  </g>

  <!-- Grid del cuadrante -->
  <g transform="translate(80, 300)">
    <!-- Header de días -->
    <g font-family="'Geist', system-ui, sans-serif" font-size="11" fill="#8a8a85" letter-spacing="1">
      <text x="0"   y="14">PERSONA</text>
      <text x="220" y="14" text-anchor="middle">LUN 13</text>
      <text x="320" y="14" text-anchor="middle">MAR 14</text>
      <text x="420" y="14" text-anchor="middle">MIÉ 15</text>
      <text x="520" y="14" text-anchor="middle">JUE 16</text>
      <text x="620" y="14" text-anchor="middle">VIE 17</text>
      <text x="720" y="14" text-anchor="middle">SÁB 18</text>
      <text x="820" y="14" text-anchor="middle">DOM 19</text>
    </g>
    <line x1="0" y1="26" x2="870" y2="26" stroke="#e8e6df" stroke-width="1"/>

    <!-- Filas de personas con turnos asignados -->
    <!-- Fila 1: María C. (Enfermería) -->
    <g transform="translate(0, 40)">
      <circle cx="14" cy="20" r="14" fill="#e9f5f2" stroke="#0f7a6d" stroke-width="1"/>
      <text x="14" y="24" text-anchor="middle" font-family="'Geist', sans-serif" font-size="10" font-weight="600" fill="#0a5950">MC</text>
      <text x="38" y="18" font-family="'Geist', sans-serif" font-size="13" font-weight="500" fill="#0e0f0f">María C.</text>
      <text x="38" y="32" font-family="'Geist', sans-serif" font-size="11" fill="#8a8a85">Enfermería</text>
      <!-- Slots -->
      <g font-family="'Geist Mono', monospace" font-size="10" font-weight="500">
        <rect x="180" y="6" width="80" height="32" rx="6" fill="url(#shiftMorning)"/>
        <text x="220" y="26" text-anchor="middle" fill="#0a5950">M · 7-15</text>
        <rect x="280" y="6" width="80" height="32" rx="6" fill="url(#shiftMorning)"/>
        <text x="320" y="26" text-anchor="middle" fill="#0a5950">M · 7-15</text>
        <rect x="380" y="6" width="80" height="32" rx="6" fill="url(#shiftEvening)"/>
        <text x="420" y="26" text-anchor="middle" fill="#5a4a2a">T · 15-22</text>
        <rect x="480" y="6" width="80" height="32" rx="6" fill="url(#shiftEvening)"/>
        <text x="520" y="26" text-anchor="middle" fill="#5a4a2a">T · 15-22</text>
        <rect x="580" y="6" width="80" height="32" rx="6" fill="#f4f2ec" stroke="#c8c5bb" stroke-width="1" stroke-dasharray="3 3"/>
        <text x="620" y="26" text-anchor="middle" fill="#8a8a85">Libre</text>
        <rect x="680" y="6" width="80" height="32" rx="6" fill="#f4f2ec" stroke="#c8c5bb" stroke-width="1" stroke-dasharray="3 3"/>
        <text x="720" y="26" text-anchor="middle" fill="#8a8a85">Libre</text>
        <rect x="780" y="6" width="80" height="32" rx="6" fill="url(#shiftMorning)"/>
        <text x="820" y="26" text-anchor="middle" fill="#0a5950">M · 7-15</text>
      </g>
    </g>

    <!-- Fila 2: Javier R. -->
    <g transform="translate(0, 88)">
      <circle cx="14" cy="20" r="14" fill="#f4f2ec" stroke="#c8c5bb" stroke-width="1"/>
      <text x="14" y="24" text-anchor="middle" font-family="'Geist', sans-serif" font-size="10" font-weight="600" fill="#4a4a47">JR</text>
      <text x="38" y="18" font-family="'Geist', sans-serif" font-size="13" font-weight="500" fill="#0e0f0f">Javier R.</text>
      <text x="38" y="32" font-family="'Geist', sans-serif" font-size="11" fill="#8a8a85">Enfermería</text>
      <g font-family="'Geist Mono', monospace" font-size="10" font-weight="500">
        <rect x="180" y="6" width="80" height="32" rx="6" fill="url(#shiftEvening)"/>
        <text x="220" y="26" text-anchor="middle" fill="#5a4a2a">T · 15-22</text>
        <rect x="280" y="6" width="80" height="32" rx="6" fill="url(#shiftNight)"/>
        <text x="320" y="26" text-anchor="middle" fill="#faf9f6">N · 22-7</text>
        <rect x="380" y="6" width="80" height="32" rx="6" fill="url(#shiftNight)"/>
        <text x="420" y="26" text-anchor="middle" fill="#faf9f6">N · 22-7</text>
        <rect x="480" y="6" width="80" height="32" rx="6" fill="#f4f2ec" stroke="#c8c5bb" stroke-width="1" stroke-dasharray="3 3"/>
        <text x="520" y="26" text-anchor="middle" fill="#8a8a85">Libre</text>
        <rect x="580" y="6" width="80" height="32" rx="6" fill="url(#shiftMorning)"/>
        <text x="620" y="26" text-anchor="middle" fill="#0a5950">M · 7-15</text>
        <rect x="680" y="6" width="80" height="32" rx="6" fill="url(#shiftMorning)"/>
        <text x="720" y="26" text-anchor="middle" fill="#0a5950">M · 7-15</text>
        <rect x="780" y="6" width="80" height="32" rx="6" fill="url(#shiftEvening)"/>
        <text x="820" y="26" text-anchor="middle" fill="#5a4a2a">T · 15-22</text>
      </g>
    </g>

    <!-- Fila 3: Ana G. con badge IA -->
    <g transform="translate(0, 136)">
      <circle cx="14" cy="20" r="14" fill="#e9f5f2" stroke="#0f7a6d" stroke-width="1"/>
      <text x="14" y="24" text-anchor="middle" font-family="'Geist', sans-serif" font-size="10" font-weight="600" fill="#0a5950">AG</text>
      <text x="38" y="18" font-family="'Geist', sans-serif" font-size="13" font-weight="500" fill="#0e0f0f">Ana G.</text>
      <text x="38" y="32" font-family="'Geist', sans-serif" font-size="11" fill="#8a8a85">Médico</text>
      <g font-family="'Geist Mono', monospace" font-size="10" font-weight="500">
        <rect x="180" y="6" width="80" height="32" rx="6" fill="url(#shiftMorning)"/>
        <text x="220" y="26" text-anchor="middle" fill="#0a5950">M · 8-15</text>
        <rect x="280" y="6" width="80" height="32" rx="6" fill="url(#shiftMorning)"/>
        <text x="320" y="26" text-anchor="middle" fill="#0a5950">M · 8-15</text>
        <rect x="380" y="6" width="80" height="32" rx="6" fill="#f4f2ec" stroke="#c8c5bb" stroke-width="1" stroke-dasharray="3 3"/>
        <text x="420" y="26" text-anchor="middle" fill="#8a8a85">Libre</text>
        <!-- Slot recién asignado por la IA — borde teal + badge -->
        <rect x="480" y="6" width="80" height="32" rx="6" fill="url(#shiftEvening)" stroke="#0f7a6d" stroke-width="1.5"/>
        <text x="520" y="26" text-anchor="middle" fill="#5a4a2a">T · 15-22</text>
        <circle cx="560" cy="10" r="5" fill="#0f7a6d"/>
        <text x="560" y="13.5" text-anchor="middle" font-family="'Geist', sans-serif" font-size="7" font-weight="700" fill="#fff">AI</text>
        <rect x="580" y="6" width="80" height="32" rx="6" fill="url(#shiftMorning)"/>
        <text x="620" y="26" text-anchor="middle" fill="#0a5950">M · 8-15</text>
        <rect x="680" y="6" width="80" height="32" rx="6" fill="#f4f2ec" stroke="#c8c5bb" stroke-width="1" stroke-dasharray="3 3"/>
        <text x="720" y="26" text-anchor="middle" fill="#8a8a85">Libre</text>
        <rect x="780" y="6" width="80" height="32" rx="6" fill="#f4f2ec" stroke="#c8c5bb" stroke-width="1" stroke-dasharray="3 3"/>
        <text x="820" y="26" text-anchor="middle" fill="#8a8a85">Libre</text>
      </g>
    </g>

    <!-- Fila 4: Pedro L. -->
    <g transform="translate(0, 184)">
      <circle cx="14" cy="20" r="14" fill="#f4f2ec" stroke="#c8c5bb" stroke-width="1"/>
      <text x="14" y="24" text-anchor="middle" font-family="'Geist', sans-serif" font-size="10" font-weight="600" fill="#4a4a47">PL</text>
      <text x="38" y="18" font-family="'Geist', sans-serif" font-size="13" font-weight="500" fill="#0e0f0f">Pedro L.</text>
      <text x="38" y="32" font-family="'Geist', sans-serif" font-size="11" fill="#8a8a85">Auxiliar</text>
      <g font-family="'Geist Mono', monospace" font-size="10" font-weight="500">
        <rect x="180" y="6" width="80" height="32" rx="6" fill="url(#shiftNight)"/>
        <text x="220" y="26" text-anchor="middle" fill="#faf9f6">N · 22-7</text>
        <rect x="280" y="6" width="80" height="32" rx="6" fill="#f4f2ec" stroke="#c8c5bb" stroke-width="1" stroke-dasharray="3 3"/>
        <text x="320" y="26" text-anchor="middle" fill="#8a8a85">Libre</text>
        <rect x="380" y="6" width="80" height="32" rx="6" fill="url(#shiftMorning)"/>
        <text x="420" y="26" text-anchor="middle" fill="#0a5950">M · 7-15</text>
        <rect x="480" y="6" width="80" height="32" rx="6" fill="url(#shiftMorning)"/>
        <text x="520" y="26" text-anchor="middle" fill="#0a5950">M · 7-15</text>
        <rect x="580" y="6" width="80" height="32" rx="6" fill="url(#shiftEvening)"/>
        <text x="620" y="26" text-anchor="middle" fill="#5a4a2a">T · 15-22</text>
        <rect x="680" y="6" width="80" height="32" rx="6" fill="url(#shiftEvening)"/>
        <text x="720" y="26" text-anchor="middle" fill="#5a4a2a">T · 15-22</text>
        <rect x="780" y="6" width="80" height="32" rx="6" fill="url(#shiftNight)"/>
        <text x="820" y="26" text-anchor="middle" fill="#faf9f6">N · 22-7</text>
      </g>
    </g>

    <!-- Fila 5: Laura S. -->
    <g transform="translate(0, 232)">
      <circle cx="14" cy="20" r="14" fill="#f4f2ec" stroke="#c8c5bb" stroke-width="1"/>
      <text x="14" y="24" text-anchor="middle" font-family="'Geist', sans-serif" font-size="10" font-weight="600" fill="#4a4a47">LS</text>
      <text x="38" y="18" font-family="'Geist', sans-serif" font-size="13" font-weight="500" fill="#0e0f0f">Laura S.</text>
      <text x="38" y="32" font-family="'Geist', sans-serif" font-size="11" fill="#8a8a85">Enfermería</text>
      <g font-family="'Geist Mono', monospace" font-size="10" font-weight="500">
        <rect x="180" y="6" width="80" height="32" rx="6" fill="#f4f2ec" stroke="#c8c5bb" stroke-width="1" stroke-dasharray="3 3"/>
        <text x="220" y="26" text-anchor="middle" fill="#8a8a85">Libre</text>
        <rect x="280" y="6" width="80" height="32" rx="6" fill="url(#shiftMorning)"/>
        <text x="320" y="26" text-anchor="middle" fill="#0a5950">M · 7-15</text>
        <rect x="380" y="6" width="80" height="32" rx="6" fill="url(#shiftMorning)"/>
        <text x="420" y="26" text-anchor="middle" fill="#0a5950">M · 7-15</text>
        <rect x="480" y="6" width="80" height="32" rx="6" fill="url(#shiftEvening)"/>
        <text x="520" y="26" text-anchor="middle" fill="#5a4a2a">T · 15-22</text>
        <rect x="580" y="6" width="80" height="32" rx="6" fill="url(#shiftEvening)"/>
        <text x="620" y="26" text-anchor="middle" fill="#5a4a2a">T · 15-22</text>
        <rect x="680" y="6" width="80" height="32" rx="6" fill="url(#shiftNight)"/>
        <text x="720" y="26" text-anchor="middle" fill="#faf9f6">N · 22-7</text>
        <rect x="780" y="6" width="80" height="32" rx="6" fill="url(#shiftNight)"/>
        <text x="820" y="26" text-anchor="middle" fill="#faf9f6">N · 22-7</text>
      </g>
    </g>
  </g>

  <!-- Aside derecho: panel IA -->
  <g transform="translate(990, 300)">
    <rect x="0" y="0" width="220" height="430" rx="16" fill="#0e0f0f"/>
    <!-- Pulse dot -->
    <circle cx="20" cy="22" r="8" fill="url(#pulseDot)">
      <animate attributeName="r" values="6;10;6" dur="2.4s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0.6;1;0.6" dur="2.4s" repeatCount="indefinite"/>
    </circle>
    <circle cx="20" cy="22" r="3" fill="#4ed3c0"/>
    <text x="36" y="26" font-family="'Geist', sans-serif" font-size="12" font-weight="500" fill="#faf9f6">SARA</text>
    <text x="170" y="26" text-anchor="end" font-family="'Geist Mono', monospace" font-size="10" fill="#6e6c66">v3</text>

    <text x="20" y="62" font-family="'Instrument Serif', Georgia, serif" font-size="20" fill="#faf9f6">Asignación lista.</text>
    <text x="20" y="80" font-family="'Instrument Serif', Georgia, serif" font-size="20" font-style="italic" fill="#6ce3d2">42 turnos en 2.1s</text>

    <line x1="20" y1="100" x2="200" y2="100" stroke="#262827" stroke-width="1"/>

    <!-- Métricas -->
    <text x="20" y="124" font-family="'Geist', sans-serif" font-size="10" fill="#6e6c66" letter-spacing="1">COBERTURA</text>
    <text x="20" y="148" font-family="'Instrument Serif', Georgia, serif" font-size="32" fill="#faf9f6">100<tspan font-size="20" fill="#6e6c66">%</tspan></text>

    <text x="20" y="184" font-family="'Geist', sans-serif" font-size="10" fill="#6e6c66" letter-spacing="1">EQUIDAD NOCHE</text>
    <text x="20" y="208" font-family="'Instrument Serif', Georgia, serif" font-size="32" fill="#faf9f6">96<tspan font-size="20" fill="#6e6c66">%</tspan></text>

    <text x="20" y="244" font-family="'Geist', sans-serif" font-size="10" fill="#6e6c66" letter-spacing="1">PREFERENCIAS RESPETADAS</text>
    <text x="20" y="268" font-family="'Instrument Serif', Georgia, serif" font-size="32" fill="#faf9f6">38<tspan font-size="20" fill="#6e6c66">/41</tspan></text>

    <line x1="20" y1="288" x2="200" y2="288" stroke="#262827" stroke-width="1"/>

    <!-- Razones (legible — el usuario sabe por qué eligió cada cosa) -->
    <text x="20" y="312" font-family="'Geist', sans-serif" font-size="10" fill="#6e6c66" letter-spacing="1">RAZONES IA</text>

    <g transform="translate(20, 326)">
      <circle cx="3" cy="6" r="2" fill="#4ed3c0"/>
      <text x="12" y="9" font-family="'Geist', sans-serif" font-size="11" fill="#b8b6b0">Equilibrio diurno/nocturno</text>
    </g>
    <g transform="translate(20, 348)">
      <circle cx="3" cy="6" r="2" fill="#4ed3c0"/>
      <text x="12" y="9" font-family="'Geist', sans-serif" font-size="11" fill="#b8b6b0">2 días de descanso/persona</text>
    </g>
    <g transform="translate(20, 370)">
      <circle cx="3" cy="6" r="2" fill="#4ed3c0"/>
      <text x="12" y="9" font-family="'Geist', sans-serif" font-size="11" fill="#b8b6b0">Sin solapes prohibidos</text>
    </g>

    <!-- CTA -->
    <rect x="20" y="390" width="180" height="32" rx="8" fill="#faf9f6"/>
    <text x="110" y="411" text-anchor="middle" font-family="'Geist', sans-serif" font-size="12" font-weight="500" fill="#0e0f0f">Aprobar y publicar</text>
  </g>

  <!-- Pie del frame: leyenda compacta -->
  <g transform="translate(80, 770)" font-family="'Geist', sans-serif" font-size="11" fill="#4a4a47">
    <g><rect x="0" y="0" width="14" height="14" rx="3" fill="url(#shiftMorning)"/><text x="22" y="11">Mañana</text></g>
    <g transform="translate(110, 0)"><rect x="0" y="0" width="14" height="14" rx="3" fill="url(#shiftEvening)"/><text x="22" y="11">Tarde</text></g>
    <g transform="translate(210, 0)"><rect x="0" y="0" width="14" height="14" rx="3" fill="url(#shiftNight)"/><text x="22" y="11">Noche</text></g>
    <g transform="translate(310, 0)"><rect x="0" y="0" width="14" height="14" rx="3" fill="#fff" stroke="#c8c5bb" stroke-width="1" stroke-dasharray="2 2"/><text x="22" y="11">Libre</text></g>
    <g transform="translate(400, 0)"><circle cx="7" cy="7" r="5" fill="#0f7a6d"/><text x="22" y="11" fill="#0a5950">Asignado por IA</text></g>
  </g>
</svg>
